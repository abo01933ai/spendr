name: Sync Finance Data

on:
  schedule:
    - cron: '0 16 * * *'  # 每天午夜 00:00 台灣時間（UTC+8）
  workflow_dispatch:       # 也可手動觸發

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout spendr
        uses: actions/checkout@v4

      - name: Checkout obsidian-vault (Finance only)
        uses: actions/checkout@v4
        with:
          repository: abo01933ai/obsidian-vault
          token: ${{ secrets.OBSIDIAN_TOKEN }}
          path: obsidian-vault
          sparse-checkout: |
            Finance

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run parser
        run: python3 parse.py --finance-dir obsidian-vault/Finance --output-dir data

      - name: Commit & push if changed
        run: |
          git config user.name "spendr-bot"
          git config user.email "bot@spendr"
          git add data/
          git diff --staged --quiet || git commit -m "data: auto-sync $(date +'%Y-%m-%d')"
          git push
